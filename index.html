<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Generative AI Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-page="home">
    <div class="site-shell">
      <header class="top-banner">
        <p class="eyebrow">Simple Generative AI Demo</p>
        <h1>Start with the input text</h1>
        <p class="lead">
          Save your text here, then move through the next pages one at a time:
          tokenization, training, and generation.
        </p>
      </header>

      <main class="home-single">
        <section class="panel-flat control-card">
          <div class="section-head">
            <p class="eyebrow">Input</p>
            <h2>Choose text once</h2>
          </div>

          <label class="field">
            <span>Preset examples</span>
            <select id="presetSelect">
              <option value="story">Story sentence</option>
              <option value="science">Science sentence</option>
              <option value="chat">Chat example</option>
              <option value="poetry">Poetry line</option>
              <option value="code">Code description</option>
            </select>
          </label>

          <label class="field">
            <span>Input text</span>
            <textarea id="inputText" rows="8"></textarea>
          </label>

          <div class="button-row">
            <button id="saveTextButton" class="button primary" type="button">Save Text</button>
            <button id="resetTextButton" class="button secondary" type="button">Reset</button>
          </div>

          <p class="helper-text" id="saveStatus">
            Save your text, then continue to the next page.
          </p>
        </section>
      </main>

      <nav class="pager-nav">
        <span class="pager-link disabled" aria-hidden="true">← Previous</span>
        <a class="pager-link" href="./tokenization.html">Next: Tokenization →</a>
      </nav>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
